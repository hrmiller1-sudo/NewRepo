<!DOCTYPE html>
<html lang="en">


<head>

<title>CH8</title>
<meta charset= "utf-8">

<style>

form {display: grid;
	grid-template-rows:auto;
	grid-template-columns:6em 1fr;
	grid-gap: 1em; gap: 1em;
	background-color: #EAEAEA;
	font-family: Arial, sans-serif;
	width: 350px; padding: 10px;
	padding: 1.5em; }


legend { font-family: Georgia, "Times New Roman", serif;
	font-weight: bold; }

label { float: left; clear: left; display: block;
	width: 100px; padding-right: 10px;
	margin-top: 10px; text-align: right; }

input { display: block; margin-top: 10px; }

textarea { display: block; margin-top: 10px; }

input[type="submit"] {grid-column: 2 / 3;
		width: 10em; margin-left: 0; }

@supports ( display: grid) {}

</style>
</head>


<body>

<header><h1>Contact Us</h1></header>



<legend>  </legend>

<form>

  <label for = "myName">Name:</label>
  <input type="text" name="myName" id="myName">
  <label for ="myEmail">E-mail:</label>
  <input type = "text" name = "myEmail" id="myEmail">
  <label for = "myComments">Comments: </label>
  <textarea name="myComments" id="myComments" rows="2" cols ="20"> </textarea>
  <input type="submit" value="Submit">



</form>


</body>
